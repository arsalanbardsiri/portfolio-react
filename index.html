<body>
  <div id="root"></div>

  <!-- Comic Art SVG Distortion Filters for Liquid Melting Effects -->
  <svg style="position: absolute; width: 0; height: 0;" width="0" height="0" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Liquid Melt: animates turbulence to wiggle outlines smoothly like liquid -->
      <filter id="liquid-melt">
        <feTurbulence type="fractalNoise" baseFrequency="0.015 0.04" numOctaves="3" result="noise">
          <animate attributeName="baseFrequency" values="0.015 0.04; 0.022 0.06; 0.015 0.04" dur="10s" repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
      </filter>
      
      <filter id="liquid-melt-heavy">
        <feTurbulence type="fractalNoise" baseFrequency="0.02 0.05" numOctaves="3" result="noise">
          <animate attributeName="baseFrequency" values="0.02 0.05; 0.035 0.09; 0.02 0.05" dur="8s" repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G" />
      </filter>

      <filter id="organic-tendril">
        <feTurbulence type="fractalNoise" baseFrequency="0.025 0.04" numOctaves="4" result="noise">
          <animate attributeName="baseFrequency" values="0.025 0.04; 0.032 0.05; 0.025 0.04" dur="12s" repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <script type="module" src="/src/main.tsx"></script>
</body>
