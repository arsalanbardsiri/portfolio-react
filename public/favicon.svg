<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Back Petal (Lavender/Navy) -->
    <path id="petal-back" d="M256,190 C220,145 230,70 256,60 C282,70 292,145 256,190 Z" fill="#8c6ec9" stroke="#121124" stroke-width="8" stroke-linejoin="round" />
    <!-- Front Petal (Teal) -->
    <path id="petal-front" d="M256,180 C210,130 220,50 256,40 C292,50 302,130 256,180 Z" fill="#207a6e" stroke="#121124" stroke-width="8" stroke-linejoin="round" />
  </defs>

  <!-- Circular container representing midnight-indigo background -->
  <circle cx="256" cy="256" r="240" fill="#121124" stroke="#8c6ec9" stroke-width="12" />

  <!-- Back Petals (8 points offset by 22.5 degrees) -->
  <g>
    <use href="#petal-back" transform="rotate(22.5, 256, 256)" />
    <use href="#petal-back" transform="rotate(67.5, 256, 256)" />
    <use href="#petal-back" transform="rotate(112.5, 256, 256)" />
    <use href="#petal-back" transform="rotate(157.5, 256, 256)" />
    <use href="#petal-back" transform="rotate(202.5, 256, 256)" />
    <use href="#petal-back" transform="rotate(247.5, 256, 256)" />
    <use href="#petal-back" transform="rotate(292.5, 256, 256)" />
    <use href="#petal-back" transform="rotate(337.5, 256, 256)" />
  </g>

  <!-- Front Petals (8 points at 45 degree intervals) -->
  <g>
    <use href="#petal-front" transform="rotate(0, 256, 256)" />
    <use href="#petal-front" transform="rotate(45, 256, 256)" />
    <use href="#petal-front" transform="rotate(90, 256, 256)" />
    <use href="#petal-front" transform="rotate(135, 256, 256)" />
    <use href="#petal-front" transform="rotate(180, 256, 256)" />
    <use href="#petal-front" transform="rotate(225, 256, 256)" />
    <use href="#petal-front" transform="rotate(270, 256, 256)" />
    <use href="#petal-front" transform="rotate(315, 256, 256)" />
  </g>

  <!-- Center Eye Component -->
  <!-- Sclera -->
  <ellipse cx="256" cy="256" rx="90" ry="60" fill="#e4e1f5" stroke="#121124" stroke-width="10" />
  
  <!-- Iris (Vibrant terracotta/magenta) -->
  <circle cx="256" cy="256" r="45" fill="#d63c76" stroke="#121124" stroke-width="8" />
  
  <!-- Pupil -->
  <circle cx="256" cy="256" r="22" fill="#121124" />
  
  <!-- Highlight Glint -->
  <circle cx="242" cy="242" r="8" fill="#ffffff" />
</svg>
